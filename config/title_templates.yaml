# 标题模板库

## AI工具评测

### 好奇心型
- "这{number}款AI工具，让我{benefit}（附{resource}）"
- "我用AI{action}，{result}（附{resource}）"
- "没想到AI还能这样用！{number}个{category}技巧"
- "普通人也能{action}！AI让{benefit}（完整指南）"

### 价值承诺型
- "{number}分钟学会{skill}，AI让{benefit}"
- "从{start}到{end}，AI{action}完整教程"
- "{year}年必备！{number}个{category}工具推荐"
- "AI工具{action}，{benefit}（附下载）"

### 身份认同型
- "作为{audience}，这{number}款AI工具你必须知道"
- "{audience}必备！AI让{benefit}（实战分享）"
- "写给{audience}：如何用AI{action}"
- "{audience}的AI工具清单，效率提升{percentage}%"

### 数字符号型
- "【推荐】{number}款免费AI工具，{benefit}"
- "【干货】AI{action}，{number}个技巧（附资源）"
- "【实测】这{number}款AI工具，{benefit}"
- "【独家】{year}年AI工具榜单，{number}款推荐"

