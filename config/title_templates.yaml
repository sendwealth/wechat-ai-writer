## 标题优化规则

### 好的标题特征
1. **制造好奇缺口**（30分）
   - 信息差：读者想知道但不知道的内容
   - 意外性：反常识或出乎意料的内容
   - 悬念：欲言又止，引发好奇

2. **明确价值承诺**（25分）
   - 明确告知读者能获得什么
   - 具体化：数字、时间、结果
   - 可操作：能立即应用的技巧

3. **身份认同**（20分）
   - 明确目标受众
   - 引发情感共鸣
   - 建立联系感

4. **数字与符号**（15分）
   - 使用数字（3个、5个、10个）
   - 使用符号（【】、《》、！）
   - 使用emoji（🔥、⭐、✅）

5. **长度优化**（10分）
   - 最佳长度：20-35字
   - 前13字最重要（避免截断）
   - 前31字完整显示

---

## 标题生成流程

### Step 1: 确定主题
- 主题：{topic}
- 受众：{audience}
- 价值：{value}

### Step 2: 选择模板
- 根据主题选择合适的模板类型
- AI工具 → AI工具评测模板
- 副业 → 副业赚钱模板
- 效率 → 效率提升模板

### Step 3: 填充模板
- 替换变量（{number}、{benefit}等）
- 确保语句通顺
- 检查长度（20-35字）

### Step 4: 评分优化
- 好奇缺口：30分
- 价值承诺：25分
- 身份认同：20分
- 数字符号：15分
- 长度优化：10分

### Step 5: 生成多个候选
- 生成5个候选标题
- 选择得分最高的1-2个
- A/B测试验证效果

---

## 示例优化

### 优化前
"2026年最新国产测试设备报告深度解读"

**问题**:
- ❌ 太技术化
- ❌ 缺乏好奇心
- ❌ 没有价值承诺
- ❌ 没有身份认同
- ❌ 太长（19字）

### 优化后
"这5款国产AI工具，让我效率提升300%（附下载）"

**改进**:
- ✅ 好奇心：哪些工具？
- ✅ 价值承诺：效率提升300%
- ✅ 数字符号：5款、300%
- ✅ 身份认同：隐含目标受众
- ✅ 长度合适：27字

**得分**:
- 好奇缺口：30分
- 价值承诺：25分
- 身份认同：15分
- 数字符号：15分
- 长度优化：10分
- **总分：95分**

